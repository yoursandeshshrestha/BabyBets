<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confirm Email Change - BabyBets</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      line-height: 1.6;
      color: #09090b;
      margin: 0;
      padding: 0;
      background-color: #fafafa;
    }
    .container {
      max-width: 600px;
      margin: 40px auto;
      background-color: #ffffff;
      border-radius: 8px;
      overflow: hidden;
    }
    .header {
      background-color: #fdf4e9;
      padding: 30px;
      text-align: center;
    }
    .header h1 {
      margin: 0;
      font-size: 20px;
      font-weight: 600;
      color: #09090b;
    }
    .content {
      padding: 40px 30px;
    }
    .content p {
      margin: 0 0 16px 0;
      color: #3f3f46;
      font-size: 15px;
    }
    .button {
      display: inline-block;
      padding: 14px 32px;
      background-color: #09090b;
      color: #ffffff !important;
      text-decoration: none;
      border-radius: 6px;
      font-weight: 600;
      margin: 24px 0;
      font-size: 15px;
    }
    .footer {
      padding: 20px 30px;
      text-align: center;
      color: #71717a;
      font-size: 13px;
      border-top: 1px solid #e5e7eb;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>BabyBets</h1>
    </div>
    <div class="content">
      <p><strong>Confirm Your New Email</strong></p>
      <p>We received a request to change your email address. Click the button below to confirm:</p>

      <a href="{{ .ConfirmationURL }}" class="button">Confirm Email Change</a>

      <p style="margin-top: 24px; font-size: 13px; color: #71717a;">If you didn't request this change, please ignore this email.</p>
    </div>
    <div class="footer">
      <p>© 2026 BabyBets. All rights reserved.</p>
    </div>
  </div>
</body>
</html>
